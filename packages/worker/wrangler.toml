name = "omnidrive-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = [ "nodejs_compat_v2" ]

[triggers]
crons = ["*/30 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "omnidrive"
database_id = "8612ea67-f9e6-419f-a861-930232a7574a"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "8c23adf4a2334e35959a9e480f5392c4"

[vars]
FRONTEND_URL = "https://azadrive.my.id"
WORKER_URL = "https://omnidrive-api.asmara-putra.workers.dev"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
